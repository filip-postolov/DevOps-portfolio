name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-backend:${{ github.ref_name }}
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-frontend:${{ github.ref_name }}

      - name: Deploy to Kubernetes via SSH
      
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/portfolio-frontend
            BACKEND_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/portfolio-backend
            SHA=${{ github.sha }}

            # Create Docker Hub pull secret if it doesn't exist
            if ! kubectl get secret dockerhub-registry >/dev/null 2>&1; then
              echo "Creating imagePullSecret for Docker Hub..."
            kubectl create secret docker-registry dockerhub-registry \
              --docker-username=${{ secrets.DOCKERHUB_USERNAME }} \
              --docker-password=${{ secrets.DOCKERHUB_PASSWORD }} \
              --docker-server=https://index.docker.io/v1/
            fi

            # Patch deployment to use the pull secret
            kubectl patch serviceaccount default -p '{"imagePullSecrets":[{"name":"dockerhub-registry"}]}'

            # Update deployment image
            echo "Updating deployment with image: $IMAGE:$SHA"
            kubectl set image deployment/frontend frontend=$IMAGE:$SHA

            # Update backend deployment
            echo "Updating backend deployment with image: $BACKEND_IMAGE:$SHA"
            kubectl set image deployment/backend backend=$BACKEND_IMAGE:$SHA

            # Wait for rollout
            kubectl rollout status deployment/frontend
            kubectl rollout status deployment/backend

            # Show the current image running
            kubectl get deployment frontend -o jsonpath='{.spec.template.spec.containers[0].image}{"\n"}'
            kubectl get deployment backend -o jsonpath='{.spec.template.spec.containers[0].image}{"\n"}'
